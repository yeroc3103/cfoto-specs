<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>cfoto — specs card</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="cfoto">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#1e1e1e;--surface:#292929;--surface2:#333333;--border:rgba(255,255,255,.14);--border-focus:rgba(200,240,160,.45);--muted:rgba(255,255,255,.52);--dim:rgba(255,255,255,.70);--bright:rgba(255,255,255,.96);--accent:#c8f0a0;--accent-dim:rgba(200,240,160,.20);--danger:#ff6b6b;--radius:6px}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{background:var(--bg);color:var(--bright);font-family:'DM Mono',monospace;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:32px 16px 100px;gap:24px;-webkit-font-smoothing:antialiased}
header{width:100%;max-width:520px;display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:16px}
.wordmark{font-family:'DM Sans',sans-serif;font-weight:200;font-size:20px;letter-spacing:.2em;color:var(--bright)}
.subtitle{font-size:10px;font-weight:300;color:var(--muted);letter-spacing:.14em;text-transform:lowercase}
.panel{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;gap:20px}
.panel-header{display:flex;align-items:center;gap:10px}
.panel-num{font-size:9px;font-weight:500;color:var(--accent);letter-spacing:.15em;background:var(--accent-dim);padding:3px 8px;border-radius:3px}
.panel-title{font-size:10px;letter-spacing:.18em;color:var(--muted)}
.upload-zone{border:1px dashed rgba(255,255,255,.25);border-radius:var(--radius);padding:36px 20px;text-align:center;cursor:pointer;position:relative;transition:all .2s;overflow:hidden;background:var(--surface2)}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(200,240,160,.03)}
.upload-zone.has-image{padding:0;border-style:solid}
.upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:28px;opacity:.45;margin-bottom:8px}
.upload-text{font-size:11px;color:var(--muted);letter-spacing:.05em}
.upload-hint{font-size:10px;color:rgba(255,255,255,.38);margin-top:6px}
.upload-preview{width:100%;max-height:220px;object-fit:cover;border-radius:5px;display:none}
.exif-status{font-size:10px;letter-spacing:.06em;padding:6px 12px;border-radius:4px;display:none;align-items:center;gap:6px}
.exif-status.success{display:flex;background:rgba(200,240,160,.08);color:var(--accent);border:1px solid rgba(200,240,160,.15)}
.exif-status.fail{display:flex;background:rgba(255,107,107,.08);color:var(--danger);border:1px solid rgba(255,107,107,.15)}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
label{font-size:9px;letter-spacing:.2em;color:var(--muted)}
input[type="text"],select{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:4px;padding:10px 12px;color:var(--bright);font-family:'DM Mono',monospace;font-size:14px;font-weight:400;outline:none;transition:border-color .15s;width:100%}
input[type="text"]:focus,select:focus{border-color:var(--border-focus)}
input::placeholder{color:rgba(255,255,255,.35)}
.slider-row{display:flex;align-items:center;gap:12px}
input[type="range"]{flex:1;-webkit-appearance:none;height:2px;background:rgba(255,255,255,.20);border-radius:1px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
.slider-val{font-size:12px;color:var(--dim);width:32px;text-align:right;font-variant-numeric:tabular-nums}
.toggle-row{display:flex;gap:6px;flex-wrap:wrap}
.toggle-btn{flex:1;min-width:70px;padding:9px 8px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em;cursor:pointer;transition:all .15s;text-align:center;white-space:nowrap}
.toggle-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
#preview-wrap{width:100%;max-width:520px;display:none;flex-direction:column;gap:12px;align-items:center}
#preview-label{font-size:10px;letter-spacing:.18em;color:var(--muted);align-self:flex-start}
canvas{width:100%;border-radius:var(--radius);border:1px solid var(--border)}
.btn-row{width:100%;max-width:520px;display:flex;gap:10px}
button.primary{flex:1;padding:14px;background:var(--accent);color:#0a0a0a;border:none;border-radius:var(--radius);font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.12em;cursor:pointer;transition:opacity .15s}
button.primary:hover{opacity:.85}
button.primary:disabled{opacity:.25;cursor:default}
button.secondary{padding:14px 20px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:var(--radius);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;cursor:pointer;transition:all .15s}
button.secondary:hover{border-color:rgba(255,255,255,.18);color:var(--dim)}
@media(max-width:480px){body{padding:20px 12px 80px;gap:16px}.panel{padding:18px;gap:16px}.fields{gap:10px}}
</style>
</head>
<body>
<header>
  <span class="wordmark">cfoto</span>
  <span class="subtitle">specs card generator</span>
</header>

<div class="panel">
  <div class="panel-header"><span class="panel-num">01</span><span class="panel-title">Image</span></div>
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*">
    <div class="upload-icon" id="uploadIcon">&#9678;</div>
    <div class="upload-text" id="uploadText">Drop image or tap to browse</div>
    <div class="upload-hint" id="uploadHint">JPEG recommended — EXIF metadata auto-fills specs</div>
  </div>
  <img class="upload-preview" id="uploadPreview">
  <div class="exif-status" id="exifStatus"></div>
  <div class="field"><label>Blur Intensity</label><div class="slider-row"><input type="range" id="blurSlider" min="0" max="50" value="22"><span class="slider-val" id="blurVal">22</span></div></div>
  <div class="field"><label>Dark Overlay</label><div class="slider-row"><input type="range" id="overlaySlider" min="0" max="80" value="45"><span class="slider-val" id="overlayVal">45</span></div></div>
  <div class="field"><label>Output Ratio</label>
    <div class="toggle-row" id="ratioToggle">
      <button class="toggle-btn active" data-ratio="portrait">4:5</button>
      <button class="toggle-btn" data-ratio="tall">2:3</button>
      <button class="toggle-btn" data-ratio="square">1:1</button>
      <button class="toggle-btn" data-ratio="story">9:16</button>
    </div>
  </div>
</div>

<div class="panel">
  <div class="panel-header"><span class="panel-num">02</span><span class="panel-title">Exposure</span></div>
  <div class="fields">
    <div class="field"><label>Aperture</label><input type="text" id="aperture" placeholder="f/6.3"></div>
    <div class="field"><label>Shutter</label><input type="text" id="shutter" placeholder="1/2000s"></div>
    <div class="field"><label>ISO</label><input type="text" id="iso" placeholder="6400"></div>
    <div class="field"><label>Focal Length</label><input type="text" id="focal" placeholder="350mm"></div>
  </div>
  <div class="field full"><label>FF Equivalent (auto — Canon 1.6x, others 1.5x)</label><input type="text" id="equiv" placeholder="auto" readonly style="opacity:.55;cursor:default"></div>
</div>

<div class="panel">
  <div class="panel-header"><span class="panel-num">03</span><span class="panel-title">Gear</span></div>
  <div class="fields">
    <div class="field full"><label>Camera Body</label><input type="text" id="body" placeholder="Sony a6700" value="Sony a6700"></div>
    <div class="field full"><label>Lens</label><input type="text" id="lens" placeholder="Sony 70-350mm G" value="Sony 70-350mm G"></div>
  </div>
</div>

<div id="preview-wrap">
  <span id="preview-label">Live Preview</span>
  <canvas id="canvas"></canvas>
</div>

<div class="btn-row">
  <button class="secondary" onclick="resetAll()">Reset</button>
  <button class="primary" id="downloadBtn" onclick="saveImage()" disabled>Save Image</button>
</div>

// ---- EXIF Parser ----
function parseEXIF(buf){
  var v=new DataView(buf);
  if(v.getUint16(0)!==0xFFD8)return null;
  var off=2,len=v.byteLength;
  while(off<len-1){
    var mk=v.getUint16(off);
    if(mk===0xFFE1){
      var sl=v.getUint16(off+2),es=off+4;
      if(v.getUint32(es)===0x45786966&&v.getUint16(es+4)===0x0000)return readTIFF(v,es+6);
    }
    if((mk&0xFF00)!==0xFF00)break;
    off+=2+v.getUint16(off+2);
  }
  return null;
}
function readTIFF(v,ts){
  var le=v.getUint16(ts)===0x4949;
  function g16(o){return v.getUint16(ts+o,le)}
  function g32(o){return v.getUint32(ts+o,le)}
  if(g16(2)!==42)return null;
  var r={};
  function readIFD(off){
    var c=g16(off),e={};
    for(var i=0;i<c;i++){var eo=off+2+i*12;e[g16(eo)]={type:g16(eo+2),count:g32(eo+4),vo:eo+8}}
    return e;
  }
  function getStr(en){
    if(!en)return null;var o=en.count>4?g32(en.vo):en.vo;var s='';
    for(var i=0;i<en.count-1;i++){var c=v.getUint8(ts+o+i);if(c===0)break;s+=String.fromCharCode(c)}
    return s.trim();
  }
  function getRat(en){if(!en)return null;var o=g32(en.vo);var n=g32(o),d=g32(o+4);return d?n/d:null}
  function getShort(en){if(!en)return null;return g16(en.vo)}
  var ifd0=readIFD(g32(4));
  r.Make=getStr(ifd0[0x010F]);
  r.Model=getStr(ifd0[0x0110]);
  var ep=ifd0[0x8769];
  if(ep){
    var exif=readIFD(g32(ep.vo));
    var et=getRat(exif[0x829A]);
    if(et!==null){r.ExposureTime=et;r.ShutterStr=et>=1?et+'s':'1/'+Math.round(1/et)+'s'}
    var fn=getRat(exif[0x829D]);
    if(fn!==null){r.FNumber=fn;r.ApertureStr='f/'+(Number.isInteger(fn)?fn:fn.toFixed(1))}
    var iso=exif[0x8827];if(iso)r.ISO=getShort(iso);
    var fl=getRat(exif[0x920A]);
    if(fl!==null){r.FocalLength=fl;r.FocalStr=Math.round(fl)+'mm'}
    var fl35=exif[0xA405];if(fl35){r.FocalLength35=getShort(fl35)}
    r.LensModel=getStr(exif[0xA434]);
  }
  return r;
}

// ---- FF Equivalent ----
function calcFFEquiv(){
  var fv=document.getElementById('focal').value;
  var bv=document.getElementById('body').value.toLowerCase();
  var m=fv.match(/(\d+)/);
  if(!m)return '';
  var fl=parseInt(m[1]);
  var crop=1.5;
  if(bv.indexOf('canon')>=0)crop=1.6;
  return Math.round(fl*crop)+'mm FF';
}
function updateEquiv(){document.getElementById('equiv').value=calcFFEquiv()}

function applyEXIF(exif){
  var st=document.getElementById('exifStatus');
  if(!exif){st.className='exif-status fail';st.textContent='No EXIF found \u2014 fill specs manually';return}
  var n=0;
  if(exif.ApertureStr){document.getElementById('aperture').value=exif.ApertureStr;n++}
  if(exif.ShutterStr){document.getElementById('shutter').value=exif.ShutterStr;n++}
  if(exif.ISO){document.getElementById('iso').value=exif.ISO;n++}
  if(exif.FocalStr){document.getElementById('focal').value=exif.FocalStr;n++}
  if(exif.Make&&exif.Model){
    var cm=exif.Model.replace(new RegExp('^'+exif.Make+'\\s*','i'),'');
    document.getElementById('body').value=(exif.Make+' '+cm).trim();n++;
  }
  if(exif.LensModel){document.getElementById('lens').value=exif.LensModel;n++}
  updateEquiv();
  st.className='exif-status success';
  st.textContent='EXIF read \u2014 '+n+' field'+(n!==1?'s':'')+' auto-filled';
  if(uploadedImage)generatePreview();
}

// ---- File Upload ----
var fileInput=document.getElementById('fileInput');
fileInput.addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var r1=new FileReader();
  r1.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      uploadedImage=img;
      document.getElementById('uploadPreview').src=ev.target.result;
      document.getElementById('uploadPreview').style.display='block';
      document.getElementById('uploadZone').classList.add('has-image');
      document.getElementById('uploadIcon').style.display='none';
      document.getElementById('uploadText').style.display='none';
      document.getElementById('uploadHint').style.display='none';
      generatePreview();
    };
    img.src=ev.target.result;
  };
  r1.readAsDataURL(file);
  var r2=new FileReader();
  r2.onload=function(ev){applyEXIF(parseEXIF(ev.target.result))};
  r2.readAsArrayBuffer(file);
});

var uz=document.getElementById('uploadZone');
uz.addEventListener('dragover',function(e){e.preventDefault();uz.classList.add('drag-over')});
uz.addEventListener('dragleave',function(){uz.classList.remove('drag-over')});
uz.addEventListener('drop',function(e){e.preventDefault();uz.classList.remove('drag-over');var f=e.dataTransfer.files[0];if(f){fileInput.files=e.dataTransfer.files;fileInput.dispatchEvent(new Event('change'))}});

var pt=null;
function schedulePreview(){clearTimeout(pt);pt=setTimeout(generatePreview,120)}

// ---- Canvas Rendering ----
function generatePreview(){
  if(!uploadedImage)return;
  var dim=RATIOS[currentRatio],w=dim.w,h=dim.h;
  var blur=parseInt(document.getElementById('blurSlider').value);
  var ov=parseInt(document.getElementById('overlaySlider').value);
  var canvas=document.getElementById('canvas');
  canvas.width=w;canvas.height=h;
  var ctx=canvas.getContext('2d');

  var tmp=document.createElement('canvas');tmp.width=w;tmp.height=h;
  var tc=tmp.getContext('2d');
  var sc=Math.max(w/uploadedImage.width,h/uploadedImage.height)*1.1;
  var iw=uploadedImage.width*sc,ih=uploadedImage.height*sc;
  var ix=(w-iw)/2,iy=(h-ih)/2,pad=blur*2;
  tc.filter=blur>0?'blur('+blur+'px)':'none';
  tc.drawImage(uploadedImage,ix-pad,iy-pad,iw+pad*2,ih+pad*2);
  ctx.drawImage(tmp,0,0);

  ctx.fillStyle='rgba(0,0,0,'+(ov/100)+')';
  ctx.fillRect(0,0,w,h);

  drawSpecs(ctx,w,h);

  document.getElementById('preview-wrap').style.display='flex';
  document.getElementById('downloadBtn').disabled=false;
}

function measureSpecs(w){
  var y=0;
  var labelSize=Math.round(w*0.022);
  var valueSize=Math.round(w*0.062);
  var gs=Math.round(w*0.030);

  if(watermarkImg){
    var logoW=w*0.22;
    var logoH=logoW*(watermarkImg.height/watermarkImg.width);
    y+=logoH+w*0.025;
  }
  y+=w*0.055;

  var specs=0;
  if(document.getElementById('aperture').value)specs++;
  if(document.getElementById('shutter').value)specs++;
  if(document.getElementById('iso').value)specs++;
  if(document.getElementById('focal').value)specs++;
  y+=specs*(labelSize*1.6+valueSize*1.35);

  y+=w*0.03+w*0.045;

  if(document.getElementById('body').value)y+=gs*2;
  if(document.getElementById('lens').value)y+=gs*1.2;

  return y;
}

function drawSpecs(ctx,w,h){
  var padL=w*0.09;
  var totalH=measureSpecs(w);
  var y=(h-totalH)/2;

  if(watermarkImg){
    var logoW=w*0.22;
    var logoH=logoW*(watermarkImg.height/watermarkImg.width);
    ctx.save();
    ctx.globalAlpha=0.30;
    ctx.drawImage(watermarkImg,padL,y,logoW,logoH);
    ctx.restore();
    y+=logoH+w*0.025;
  }

  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+w*0.05,y);ctx.stroke();
  y+=w*0.055;

  var specs=[];
  var ap=document.getElementById('aperture').value;
  var sh=document.getElementById('shutter').value;
  var iso=document.getElementById('iso').value;
  var fl=document.getElementById('focal').value;
  var eq=document.getElementById('equiv').value;

  if(ap)specs.push({label:'aperture',value:ap});
  if(sh)specs.push({label:'shutter',value:sh});
  if(iso)specs.push({label:'iso',value:iso});
  if(fl){
    var fv=fl;
    if(eq)fv+='  ('+eq+')';
    specs.push({label:'focal length',value:fv});
  }

  var labelSize=Math.round(w*0.022);
  var valueSize=Math.round(w*0.062);

  specs.forEach(function(spec){
    ctx.font='300 '+labelSize+'px "DM Mono"';
    ctx.fillStyle='rgba(255,255,255,0.28)';
    ctx.textBaseline='top';
    ctx.fillText(spec.label,padL,y);
    y+=labelSize*1.6;

    ctx.font='400 '+valueSize+'px "DM Mono"';
    ctx.fillStyle='rgba(255,255,255,0.90)';
    ctx.fillText(spec.value,padL,y);
    y+=valueSize*1.35;
  });

  y+=w*0.03;

  ctx.strokeStyle='rgba(255,255,255,0.10)';
  ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+w*0.05,y);ctx.stroke();
  y+=w*0.045;

  var gs=Math.round(w*0.030);
  var bv=document.getElementById('body').value;
  var lv=document.getElementById('lens').value;

  if(bv){
    ctx.font='300 '+gs+'px "DM Mono"';
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.textBaseline='top';
    ctx.fillText(bv,padL,y);
    y+=gs*2;
  }
  if(lv){
    ctx.font='300 '+gs+'px "DM Mono"';
    ctx.fillStyle='rgba(255,255,255,0.30)';
    ctx.textBaseline='top';
    ctx.fillText(lv,padL,y);
  }
}

// ---- Get canvas blob as promise ----
function getCanvasBlob(){
  return new Promise(function(resolve){
    document.getElementById('canvas').toBlob(function(b){resolve(b)},'image/jpeg',0.95);
  });
}

// ---- Save: tries Android share sheet first (Google Photos, etc), falls back to download ----
function saveImage(){
  getCanvasBlob().then(function(blob){
    if(!blob)return;
    var file=new File([blob],'cfoto-specs-'+currentRatio+'.jpg',{type:'image/jpeg'});
    // Try share sheet first — on Android this shows Google Photos, Lightroom, etc.
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'cfoto specs card'}).catch(function(err){
        // User cancelled share or error — fall back to download
        if(err.name!=='AbortError')directDownload(blob);
      });
    }else{
      directDownload(blob);
    }
  });
}

function directDownload(blob){
  var u=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.download='cfoto-specs-'+currentRatio+'.jpg';
  a.href=u;
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u)},1000);
}

// ---- Reset ----
function resetAll(){
  ['aperture','shutter','iso','focal'].forEach(function(id){document.getElementById(id).value=''});
  document.getElementById('equiv').value='';
  document.getElementById('body').value='Sony a6700';
  document.getElementById('lens').value='Sony 70-350mm G';
  document.getElementById('blurSlider').value=22;document.getElementById('blurVal').textContent='22';
  document.getElementById('overlaySlider').value=45;document.getElementById('overlayVal').textContent='45';
  document.getElementById('exifStatus').className='exif-status';
  if(uploadedImage)generatePreview();
}
